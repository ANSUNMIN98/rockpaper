<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가위바위보 게임</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; text-align: center; background:#f4f4f4; transition:0.3s; }
.dark { background:#121212; color:white; }
.container { margin-top:50px; }
button { padding:10px 20px; margin:5px; font-size:18px; cursor:pointer; }
.score { font-size:20px; margin-top:20px; }
.top-right { position:fixed; top:10px; right:10px; }
canvas { max-width:600px; margin-top:30px; }
.win-animation { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
.confetti { position:absolute; width:10px; height:10px; background:red; animation:fall 3s linear infinite; }
@keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
.table-box { display:none; background:white; color:black; padding:20px; position:fixed; top:50px; right:10px; border-radius:10px; }
.dark .table-box { background:#333; color:white; }
</style>
</head>
<body>

<div class="top-right">
<button onclick="toggleDark()">🌙</button>
<button onclick="toggleTable()">📊</button>
</div>

<div class="container">
<h1>가위 ✌️ 바위 ✊ 보 ✋</h1>

<button onclick="play('가위')">가위</button>
<button onclick="play('바위')">바위</button>
<button onclick="play('보')">보</button>

<div class="score">
<p id="result"></p>
<p>플레이어: <span id="userScore">0</span> | 컴퓨터: <span id="cpuScore">0</span></p>
</div>

<canvas id="chart"></canvas>
</div>

<div class="table-box" id="tableBox">
<h3>승률 기록</h3>
<table border="1">
<thead><tr><th>판수</th><th>승률</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="win-animation" id="confettiBox"></div>

<script>
let userScore = 0;
let cpuScore = 0;
let history = [];
let round = 0;

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
 type: 'line',
 data: { labels: [], datasets: [{ label:'승률', data: [] }] },
 options: { scales:{ y:{ min:0, max:1 } } }
});

function play(user) {
 if(userScore === 3 || cpuScore === 3) return;

 const choices = ['가위','바위','보'];
 const cpu = choices[Math.floor(Math.random()*3)];

 let result = '';
 if(user === cpu) result = '무승부';
 else if(
  (user==='가위' && cpu==='보') ||
  (user==='바위' && cpu==='가위') ||
  (user==='보' && cpu==='바위')
 ) {
  result = '승리'; userScore++;
 } else {
  result = '패배'; cpuScore++;
 }

 round++;
 let winRate = userScore / round;
 history.push(winRate);

 document.getElementById('result').innerText = `당신: ${user} | 컴퓨터: ${cpu} → ${result}`;
 document.getElementById('userScore').innerText = userScore;
 document.getElementById('cpuScore').innerText = cpuScore;

 updateChart(winRate);
 updateTable(winRate);

 if(userScore === 3) win();
 if(cpuScore === 3) lose();
}

function updateChart(rate) {
 chart.data.labels.push(round);
 chart.data.datasets[0].data.push(rate);
 chart.update();
}

function updateTable(rate) {
 const tr = document.createElement('tr');
 tr.innerHTML = `<td>${round}</td><td>${(rate*100).toFixed(1)}%</td>`;
 document.getElementById('tableBody').appendChild(tr);
}

function win() {
 launchConfetti();
 setTimeout(()=>{
  alert('🎉 축하합니다! 승리!');
  reset();
 },2000);
}

function lose() {
 setTimeout(()=>{
  alert('😢 아쉽네요! 다시 도전!');
  reset();
 },500);
}

function reset() {
 userScore = 0; cpuScore = 0; round = 0;
 history = [];
 document.getElementById('userScore').innerText = 0;
 document.getElementById('cpuScore').innerText = 0;
 document.getElementById('result').innerText = '';
 chart.data.labels = [];
 chart.data.datasets[0].data = [];
 chart.update();
 document.getElementById('tableBody').innerHTML = '';
}

function toggleDark() {
 document.body.classList.toggle('dark');
}

function toggleTable() {
 const box = document.getElementById('tableBox');
 box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

function launchConfetti() {
 const box = document.getElementById('confettiBox');
 box.innerHTML = '';
 for(let i=0;i<100;i++){
  const div = document.createElement('div');
  div.className='confetti';
  div.style.left = Math.random()*100+'%';
  div.style.background = `hsl(${Math.random()*360},100%,50%)`;
  div.style.animationDuration = (Math.random()*3+2)+'s';
  box.appendChild(div);
 }
 setTimeout(()=> box.innerHTML='',3000);
}
</script>

</body>
</html>
